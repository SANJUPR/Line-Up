<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Arena Lineup Tracker</title>
    <style>
        :root {
            --bg-main: #0f172a; 
            --card-bg: #1e293b;
            --panel-inner: #334155;
            --primary-neon: #10b981; 
            --primary-neon-hover: #34d399;
            --accent-orange: #f59e0b; 
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #384557;
            --github-color: #24292e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            padding: 16px;
            padding-bottom: 40px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin: 15px 0 25px 0;
        }

        header h1 {
            font-size: 26px;
            color: var(--text-light);
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        header h1 span {
            color: var(--primary-neon);
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary-neon);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary-neon);
            padding-left: 8px;
        }

        /* GitHub Cloud Config Styling */
        .github-config-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .full-width-input {
            grid-column: span 2;
        }

        .github-config-grid label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .github-config-grid input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            font-size: 13px;
            color: var(--text-light);
            outline: none;
        }

        .github-config-grid input:focus {
            border-color: #3b82f6;
        }

        /* Sync Status Strip */
        .sync-status-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border-color);
            font-size: 12px;
        }

        .status-indicator {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
        }

        .status-disconnected { color: #ef4444; }
        .status-syncing { color: var(--accent-orange); }
        .status-connected { color: var(--primary-neon); }

        .config-save-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* Pacing Settings Box */
        .time-settings {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(15, 23, 42, 0.4);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .time-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .time-input-group label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .time-input-group select, .time-input-group input[type="date"] {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            font-size: 13px;
            font-weight: 800;
            color: var(--text-light);
            outline: none;
            cursor: pointer;
        }

        .time-summary-badge {
            font-size: 11px;
            font-weight: 700;
            background: var(--panel-inner);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            text-transform: uppercase;
        }

        .time-summary-badge span { color: var(--accent-orange); }

        /* Player Grid Elements */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .player-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            user-select: none;
            transition: all 0.2s;
        }

        .player-btn input { display: none; }
        .player-btn::after { content: '❌'; font-size: 11px; opacity: 0.4; }

        .player-btn.checked {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--primary-neon);
        }
        
        .player-btn.checked::after { content: '✓'; color: var(--primary-neon); font-size: 16px; font-weight: 900; }

        .counter-badge {
            background: var(--panel-inner);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid var(--border-color);
        }

        /* Leaderboard Scroller */
        .stats-scroller {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .stats-scroller::-webkit-scrollbar { display: none; }

        .stat-chip {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            white-space: nowrap;
            display: flex;
            gap: 6px;
        }
        .stat-chip span { color: var(--primary-neon); font-weight: 800; }

        /* Boxy Match Architecture Layout */
        .match-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .match-card-header {
            background: var(--panel-inner);
            padding: 6px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .round-tag { font-size: 11px; font-weight: 900; text-transform: uppercase; }

        .status-live-dot {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-orange);
            display: flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
        }
        .status-live-dot::before { content: ''; width: 6px; height: 6px; background: var(--accent-orange); border-radius: 50%; }

        .versus-container {
            display: grid;
            grid-template-columns: 1fr 45px auto 45px 1fr;
            align-items: center;
            padding: 12px 8px;
            gap: 6px;
            background: linear-gradient(180deg, rgba(30,41,59,0.3) 0%, rgba(15,23,42,0.3) 100%);
        }

        .team-box {
            padding: 10px 6px;
            border-radius: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 65px;
            justify-content: center;
        }

        .team-box.side-a { background: rgba(30, 58, 138, 0.3); border-left: 4px solid #3b82f6; }
        .team-box.side-b { background: rgba(112, 26, 117, 0.3); border-right: 4px solid #d946ef; }

        .player-name { font-size: 13px; font-weight: 800; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .score-input {
            width: 100%;
            height: 40px;
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            outline: none;
        }
        .score-input:focus { border-color: var(--accent-orange); }

        .vs-badge { background: var(--accent-orange); color: var(--bg-main); font-size: 10px; font-weight: 900; padding: 4px 6px; border-radius: 5px; font-style: italic; }

        .match-card-footer {
            background: rgba(15, 23, 42, 0.7);
            padding: 8px 14px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px dashed var(--border-color);
        }
        .match-card-footer strong { color: rgba(245, 158, 11, 0.8); font-size: 11px; text-transform: uppercase; }

        /* Cloud Sync Button */
        .sync-trigger-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: var(--primary-neon);
            border: none;
            border-radius: 12px;
            color: var(--bg-main);
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
        }
        .sync-trigger-btn:hover { background: var(--primary-neon-hover); }

        .alert-box {
            text-align: center;
            padding: 24px;
            color: var(--accent-orange);
            background: rgba(245, 158, 11, 0.05);
            border: 1px dashed rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🏸 Arena <span>Lineups</span></h1>
        <p>Dynamic Cloud Ledger & Rotation Engine</p>
    </header>

    <div class="card">
        <div class="card-title">GitHub Live Configuration</div>
        <div class="github-config-grid">
            <div class="full-width-input">
                <label>Personal Access Token (PAT)</label>
                <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            </div>
            <div>
                <label>GitHub Username</label>
                <input type="text" id="ghOwner" placeholder="e.g., player1">
            </div>
            <div>
                <label>Repository Name</label>
                <input type="text" id="ghRepo" placeholder="e.g., badminton-records">
            </div>
            <div class="full-width-input">
                <label>File Path (CSV Target)</label>
                <input type="text" id="ghPath" value="records/arena_scores.csv">
            </div>
        </div>
        <div class="sync-status-strip">
            <div>Status: <span id="syncStatusLabel" class="status-indicator status-disconnected">Disconnected</span></div>
            <button class="config-save-btn" onclick="saveConfigAndFetch()">Connect & Load</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Match Settings</div>
        <div class="time-settings">
            <div class="settings-row">
                <div class="time-input-group">
                    <label for="sessionDate">Date</label>
                    <input type="date" id="sessionDate" onchange="handleDateSwitch()">
                </div>
                <div class="time-input-group">
                    <label for="matchDuration">Pace</label>
                    <select id="matchDuration" onchange="updateInterface()">
                        <option value="15">15 Min</option>
                        <option value="12" selected>12 Min</option>
                        <option value="10">10 Min</option>
                        <option value="9">9 Min</option>
                    </select>
                </div>
            </div>
            <div class="time-summary-badge" id="timeSummary">
                Session: 90m | Target: <span id="targetRoundsCount">7</span> Fixtures
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">
            <span>Squad Availability</span>
            <span class="counter-badge" id="countBadge">0 Active</span>
        </div>
        <div class="player-grid" id="playerGrid"></div>
    </div>

    <div class="card" id="statsCard" style="display:none;">
        <div class="card-title">Individual Game Tally</div>
        <div class="stats-scroller" id="statsScroller"></div>
    </div>

    <div class="card">
        <div class="card-title" id="planTitle">Match Schedule</div>
        <div id="scheduleContainer">
            <div class="alert-box">Select 4 to 10 active players to initialize.</div>
        </div>
    </div>
</div>

<script>
    const playersList = ["Sanju", "Christo", "Akshay", "Jain", "Chetan", "Hashim", "Shyam", "Kamala", "Sona", "Sreejith"];
    const initialChecked = ["Sanju", "Christo", "Akshay", "Jain", "Chetan", "Hashim", "Shyam", "Kamala"];
    const TOTAL_SESSION_MINUTES = 90; 

    let sessionScores = {}; 
    let generatedMatchesData = [];
    let completeCloudHistory = []; 
    let currentFileSha = null; 

    function init() {
        // Formulate Default Date Localized Setup
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('sessionDate').value = `${yyyy}-${mm}-${dd}`;

        // Hydrate configuration credentials from localStorage
        document.getElementById('ghToken').value = localStorage.getItem('badminton_gh_token') || '';
        document.getElementById('ghOwner').value = localStorage.getItem('badminton_gh_owner') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('badminton_gh_repo') || '';
        if (localStorage.getItem('badminton_gh_path')) {
            document.getElementById('ghPath').value = localStorage.getItem('badminton_gh_path');
        }

        renderPlayerGrid();
        
        if (localStorage.getItem('badminton_gh_token')) {
            fetchFromGitHub();
        } else {
            updateInterface();
        }
    }

    function renderPlayerGrid() {
        const playerGrid = document.getElementById('playerGrid');
        playerGrid.innerHTML = '';
        playersList.forEach(name => {
            const checked = initialChecked.includes(name) ? 'checked' : '';
            const div = document.createElement('div');
            div.className = `player-btn ${checked ? 'checked' : ''}`;
            div.innerHTML = `<input type="checkbox" value="${name}" ${checked} onchange="updateInterface()"><span>${name}</span>`;
            
            div.addEventListener('click', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    const cb = this.querySelector('input');
                    cb.checked = !cb.checked;
                    updateInterface();
                }
            });
            playerGrid.appendChild(div);
        });
    }

    function updateInterface() {
        const checkedBoxes = document.querySelectorAll('#playerGrid input:checked');
        const activePlayers = Array.from(checkedBoxes).map(cb => cb.value);
        const count = activePlayers.length;
        
        const gameMinutes = parseInt(document.getElementById('matchDuration').value);
        document.getElementById('targetRoundsCount').innerText = Math.floor(TOTAL_SESSION_MINUTES / gameMinutes);

        document.querySelectorAll('.player-btn').forEach(btn => {
            if(btn.querySelector('input').checked) btn.classList.add('checked');
            else btn.classList.remove('checked');
        });

        document.getElementById('countBadge').innerText = `${count} Ready`;
        
        if (count >= 4 && count <= 10) {
            document.getElementById('planTitle').innerText = `Fixtures Board (${count} Players)`;
            generateDynamicSchedule(activePlayers, count, Math.floor(TOTAL_SESSION_MINUTES / gameMinutes));
        } else {
            document.getElementById('planTitle').innerText = "Match Schedule";
            document.getElementById('statsCard').style.display = 'none';
            document.getElementById('scheduleContainer').innerHTML = `<div class="alert-box">Invalid Matrix Selection. (Current: ${count})</div>`;
        }
    }

    function saveScore(matchIndex, team, value) {
        if (!sessionScores[matchIndex]) sessionScores[matchIndex] = { scoreA: '', scoreB: '' };
        if (team === 'A') sessionScores[matchIndex].scoreA = value;
        else sessionScores[matchIndex].scoreB = value;
    }

    function renderOutput(rounds, summary) {
        let html = '';
        rounds.forEach((r, idx) => {
            const savedA = sessionScores[idx]?.scoreA || '';
            const savedB = sessionScores[idx]?.scoreB || '';

            html += `
                <div class="match-card">
                    <div class="match-card-header">
                        <span class="round-tag">${r.name}</span>
                        <span class="status-live-dot">Live Stream</span>
                    </div>
                    <div class="versus-container">
                        <div class="team-box side-a">
                            <div class="player-name">${r.teamA1}</div>
                            <div class="player-name">${r.teamA2}</div>
                        </div>
                        <input type="number" class="score-input" placeholder="0" min="0" value="${savedA}" oninput="saveScore(${idx}, 'A', this.value)">
                        <div class="versus-divider"><span class="vs-badge">VS</span></div>
                        <input type="number" class="score-input" placeholder="0" min="0" value="${savedB}" oninput="saveScore(${idx}, 'B', this.value)">
                        <div class="team-box side-b">
                            <div class="player-name">${r.teamB1}</div>
                            <div class="player-name">${r.teamB2}</div>
                        </div>
                    </div>
                    <div class="match-card-footer"><strong>Bench:</strong> ⏳ ${r.bench.replace(/;/g, ', ')}</div>
                </div>`;
        });

        html += `<button class="sync-trigger-btn" onclick="syncToGitHub()">☁️ Push Live Updates to GitHub</button>`;
        document.getElementById('scheduleContainer').innerHTML = html;

        document.getElementById('statsCard').style.display = 'block';
        const scroller = document.getElementById('statsScroller');
        scroller.innerHTML = '';
        for (const [pName, pCount] of Object.entries(summary)) {
            const chip = document.createElement('div');
            chip.className = 'stat-chip';
            chip.innerHTML = `<strong>${pName}</strong> <span>${pCount} Games</span>`;
            scroller.appendChild(chip);
        }
    }

    function generateDynamicSchedule(p, count, targetRounds) {
        let baseRounds = [];
        if (count === 4) {
            baseRounds = [
                { tA1: p[0], tA2: p[1], tB1: p[2], tB2: p[3], bench: "None" },
                { tA1: p[0], tA2: p[2], tB1: p[1], tB2: p[3], bench: "None" },
                { tA1: p[0], tA2: p[3], tB1: p[1], tB2: p[2], bench: "None" }
            ];
        } else if (count === 5) {
            for (let i = 0; i < 5; i++) {
                let bench = p[i];
                let c = p.filter(n => n !== bench);
                baseRounds.push({ tA1: c[0], tA2: c[1], tB1: c[2], tB2: c[3], bench: bench });
            }
        } else if (count === 6 || count === 7) {
            for (let i = 0; i < count; i++) {
                let cIdx = [i % count, (i + 1) % count, (i + 2) % count, (i + 4) % count];
                let c = cIdx.map(idx => p[idx]);
                let bench = p.filter(n => !c.includes(n));
                baseRounds.push({ tA1: c[0], tA2: c[1], tB1: c[2], tB2: c[3], bench: bench.join(';') });
            }
        } else if (count === 8) {
            let gA = [p[0], p[1], p[2], p[3]]; let gB = [p[4], p[5], p[6], p[7]];
            baseRounds = [
                { tA1: gA[0], tA2: gA[1], tB1: gA[2], tB2: gA[3], bench: gB.join(';') },
                { tA1: gB[0], tA2: gB[1], tB1: gB[2], tB2: gB[3], bench: gA.join(';') },
                { tA1: gA[0], tA2: gA[2], tB1: gA[1], tB2: gA[3], bench: gB.join(';') },
                { tA1: gB[0], tA2: gB[1], tB1: gB[3], tB2: gB[2], bench: gA.join(';') },
                { tA1: gA[0], tA2: gA[3], tB1: gA[1], tB2: gA[2], bench: gB.join(';') },
                { tA1: gB[0], tA2: gB[3], tB1: gB[1], tB2: gB[2], bench: gA.join(';') }
            ];
        } else if (count === 9 || count === 10) {
            for (let r = 0; r < count; r++) {
                let c = [p[(r*4)%count], p[(r*4+1)%count], p[(r*4+2)%count], p[(r*4+3)%count]];
                let bench = p.filter(n => !c.includes(n));
                baseRounds.push({ tA1: c[0], tA2: c[1], tB1: c[2], tB2: c[3], bench: bench.join(';') });
            }
        }

        generatedMatchesData = [];
        let finalRounds = [];
        let summary = {};
        p.forEach(name => summary[name] = 0);

        for (let i = 0; i < targetRounds; i++) {
            let baseMatch = baseRounds[i % baseRounds.length];
            let matchObj = {
                name: `Match 0${i + 1}`,
                teamA1: baseMatch.tA1, teamA2: baseMatch.tA2,
                teamB1: baseMatch.tB1, teamB2: baseMatch.tB2,
                bench: baseMatch.bench
            };
            finalRounds.push(matchObj);
            generatedMatchesData.push(matchObj);

            summary[baseMatch.tA1]++; summary[baseMatch.tA2]++;
            summary[baseMatch.tB1]++; summary[baseMatch.tB2]++;
        }

        renderOutput(finalRounds, summary);
    }

    /* GITHUB OPERATIONS CONTROLLER */
    function saveConfigAndFetch() {
        localStorage.setItem('badminton_gh_token', document.getElementById('ghToken').value.trim());
        localStorage.setItem('badminton_gh_owner', document.getElementById('ghOwner').value.trim());
        localStorage.setItem('badminton_gh_repo', document.getElementById('ghRepo').value.trim());
        localStorage.setItem('badminton_gh_path', document.getElementById('ghPath').value.trim());
        fetchFromGitHub();
    }

    function updateStatusLabel(text, type) {
        const lbl = document.getElementById('syncStatusLabel');
        lbl.innerText = text;
        lbl.className = `status-indicator status-${type}`;
    }

    async function fetchFrom
